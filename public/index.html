<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Tienda - Portafolio M7</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 30px; 
            padding: 40px; 
            background: #f4f7f6; 
        }

        /* Alineación superior para ambos contenedores */
        .main-content, .cart-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }

        /* Estilo para las imágenes */
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #eee; /* Color de carga */
        }

        .btn-add { 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 10px; 
            cursor: pointer; 
            border-radius: 6px; 
            width: 100%; 
            font-weight: bold;
        }

        .cart-panel { 
            background: #fff; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            position: sticky; 
            top: 40px; 
            height: fit-content; 
            border: 1px solid #e1e8e7;
            margin-top: 50px;
        }

        .btn-buy { 
            background: #2980b9; 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            font-size: 1.1em; 
            cursor: pointer; 
            border-radius: 8px; 
            margin-top: 15px; 
            font-weight: bold;
        }

        h2, h3 { color: #2c3e50; margin: 0; }
    </style>
</head>
<body>

    <div class="main-content">
        <h2>📦 Catálogo de Productos</h2>
        <div id="productos" class="card-container"></div>
        <hr>
        <h2>📜 Historial de Ventas</h2>
        <div id="historial"></div>
    </div>

    <div class="cart-panel">
        <h3>🛒 Carrito de Compras</h3>
        <div id="items-carrito" style="margin-top: 15px;"></div>
        <div id="totales" style="border-top: 2px solid #f4f7f6; margin-top: 15px; padding-top: 15px; font-size: 1.2em;">
            <strong>Total: $0</strong>
        </div>
        <button class="btn-buy" onclick="comprar()">Comprar ahora</button>
    </div>

    <script>
        const clp = new Intl.NumberFormat('es-CL', {
        style: 'currency',
        currency: 'CLP',
        minimumFractionDigits: 0
        });
        
        let carrito = [];

        const cargarProductos = async () => {
        const r = await fetch('/articulos'); 
        const data = await r.json();
        
        document.getElementById('productos').innerHTML = data.map(p => `
            <div class="card">
                <img src="${p.url_imagen || 'https://via.placeholder.com/200x150?text=Sin+Imagen'}" alt="${p.nombre}">
                <h4>${p.nombre}</h4>
                <p style="color: #27ae60; font-weight: bold; font-size: 1.1em;">
                    ${clp.format(p.precio)} </p>
                <p><small>Stock disponible: ${p.stock}</small></p>
                <button class="btn-add" onclick="agregar(${p.id}, '${p.nombre}', ${p.precio})">
                    Agregar al carrito
                </button>
            </div>
        `).join('');
    };

        const agregar = (id, nombre, precio) => {
            const existe = carrito.find(item => item.id_producto === id);
            if(existe) {
                existe.cantidad++;
            } else {
                carrito.push({ id_producto: id, nombre, precio, cantidad: 1 });
            }
            renderCarrito();
        };

        const renderCarrito = () => {
        const div = document.getElementById('items-carrito');
        const total = carrito.reduce((acc, cur) => acc + (cur.precio * cur.cantidad), 0);
        
        div.innerHTML = carrito.map(i => `
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em;">
                <span>${i.nombre} x${i.cantidad}</span>
                <span>${clp.format(i.precio * i.cantidad)}</span> </div>
        `).join('');
        
        document.getElementById('totales').innerHTML = `<strong>Total: ${clp.format(total)}</strong>`; // CAMBIADO AQUÍ
        };

        const comprar = async () => {
            if(carrito.length === 0) return alert("El carrito está vacío");
            
            const r = await fetch('/venta', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ items: carrito })
            });

            const res = await r.json();
            if(r.ok) {
                alert(`✅ ¡Venta Exitosa!\nOrden ID: ${res.id_venta}`);
                carrito = [];
                renderCarrito();
                cargarProductos();
                cargarVentas();
            } else {
                alert(`❌ Error en la compra: ${res.error}`);
            }
        };
        
        const cargarVentas = async () => {
            try {
                const r = await fetch('/ventas');
                const data = await r.json();
                const contenedor = document.getElementById('historial');

                if (data.length === 0) {
                    contenedor.innerHTML = "<p>No hay ventas registradas.</p>";
                    return;
                }

                let html = `
                    <table style="width:100%; border-collapse: collapse; background: white; margin-top:10px;">
                        <thead>
                            <tr style="background: #2c3e50; color: white;">
                                <th style="padding: 10px;">ID</th>
                                <th style="padding: 10px;">Fecha</th>
                                <th style="padding: 10px;">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.forEach(v => {
                    // Usamos v.id, v.fecha y v.total (nombres que vienen en tu JSON)
                    html += `
                        <tr style="border-bottom: 1px solid #eee; text-align: center;">
                            <td style="padding: 10px;">#${v.id}</td>
                            <td style="padding: 10px;">${new Date(v.fecha).toLocaleString()}</td>
                            <td style="padding: 10px; font-weight:bold;">${clp.format(v.total)}</td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
                contenedor.innerHTML = html;
            } catch (e) {
                console.error("Error cargando historial:", e);
            }
        };
        // ... (Tu función cargarVentas con la tabla que sugerimos antes) ...

        window.onload = () => { cargarProductos(); cargarVentas(); };
    </script>
</body>
</html>
